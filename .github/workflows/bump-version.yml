name: Bump Version and Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-and-release:
    name: Bump Version and Create Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
    
    - name: Bump version
      id: bump
      run: |
        # Get current version from root package.json
        CURRENT_VERSION=$(node -p "require('./package.json').version")
        echo "Current version: $CURRENT_VERSION"
        
        # Split version into parts
        IFS='.' read -r -a VERSION_PARTS <<< "$CURRENT_VERSION"
        MAJOR=${VERSION_PARTS[0]}
        MINOR=${VERSION_PARTS[1]}
        PATCH=${VERSION_PARTS[2]}
        
        # Bump version based on input
        case "${{ github.event.inputs.version_type }}" in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          patch)
            PATCH=$((PATCH + 1))
            ;;
        esac
        
        NEW_VERSION="$MAJOR.$MINOR.$PATCH"
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "Bumping version: $CURRENT_VERSION → $NEW_VERSION"
        
        # Update all package.json files
        for file in package.json packages/*/package.json; do
          if [ -f "$file" ]; then
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$file', 'utf8'));
              pkg.version = '$NEW_VERSION';
              fs.writeFileSync('$file', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "Updated $file"
          fi
        done
        
        # Update CLI dependencies
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('packages/cli/package.json', 'utf8'));
          if (pkg.dependencies) {
            if (pkg.dependencies['@agent-sync/core']) pkg.dependencies['@agent-sync/core'] = '$NEW_VERSION';
            if (pkg.dependencies['@agent-sync/schemas']) pkg.dependencies['@agent-sync/schemas'] = '$NEW_VERSION';
          }
          fs.writeFileSync('packages/cli/package.json', JSON.stringify(pkg, null, 2) + '\n');
        "
        
        # Update README badge
        sed -i "s/version-[0-9]*\.[0-9]*\.[0-9]*/version-$NEW_VERSION/" README.md
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
    
    - name: Update lockfile
      run: pnpm install --no-frozen-lockfile
    
    - name: Commit version bump
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -A
        git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }}"
        git push
    
    - name: Create Git tag
      run: |
        git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
        git push origin "v${{ steps.bump.outputs.new_version }}"
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.bump.outputs.new_version }}
        name: AgentSync CLI v${{ steps.bump.outputs.new_version }}
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Summary
      run: |
        echo "✅ Version bumped to ${{ steps.bump.outputs.new_version }}"
        echo "✅ Git tag created: v${{ steps.bump.outputs.new_version }}"
        echo "✅ GitHub Release created"
