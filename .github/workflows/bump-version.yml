name: Bump Version

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
    
    - name: Bump version
      id: bump
      run: |
        # Get current version from root package.json
        CURRENT_VERSION=$(node -p "require('./package.json').version")
        echo "Current version: $CURRENT_VERSION"
        
        # Split version into parts
        IFS='.' read -r -a VERSION_PARTS <<< "$CURRENT_VERSION"
        MAJOR=${VERSION_PARTS[0]}
        MINOR=${VERSION_PARTS[1]}
        PATCH=${VERSION_PARTS[2]}
        
        # Bump version based on input
        case "${{ github.event.inputs.version_type }}" in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          patch)
            PATCH=$((PATCH + 1))
            ;;
        esac
        
        NEW_VERSION="$MAJOR.$MINOR.$PATCH"
        echo "New version: $NEW_VERSION"
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        
        # Update all package.json files
        for file in package.json packages/*/package.json; do
          if [ -f "$file" ]; then
            # Update version field
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$file', 'utf8'));
              pkg.version = '$NEW_VERSION';
              fs.writeFileSync('$file', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "Updated $file"
          fi
        done
        
        # Update dependencies in CLI package
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('packages/cli/package.json', 'utf8'));
          if (pkg.dependencies) {
            if (pkg.dependencies['@agent-sync/core']) {
              pkg.dependencies['@agent-sync/core'] = '$NEW_VERSION';
            }
            if (pkg.dependencies['@agent-sync/schemas']) {
              pkg.dependencies['@agent-sync/schemas'] = '$NEW_VERSION';
            }
          }
          fs.writeFileSync('packages/cli/package.json', JSON.stringify(pkg, null, 2) + '\n');
        "
        echo "Updated CLI dependencies"
        
        # Update README badge
        sed -i "s/version-[0-9]*\.[0-9]*\.[0-9]*/version-$NEW_VERSION/" README.md
        echo "Updated README.md"
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
    
    - name: Update lockfile
      run: |
        pnpm install --no-frozen-lockfile
    
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add -A
        git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }}"
        git push
        
        echo "✅ Version bumped to ${{ steps.bump.outputs.new_version }}"
    
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: version-bump-${{ steps.bump.outputs.new_version }}
        title: 'chore(release): bump version to ${{ steps.bump.outputs.new_version }}'
        body: |
          ## Version Bump
          
          Automatically bumped version from to ${{ steps.bump.outputs.new_version }}
          
          ### Changes
          - Updated all package.json files
          - Updated dependencies
          - Updated lockfile
          - Updated README badge
          
          ### Next Steps
          1. Review this PR
          2. Merge to main
          3. Tag will be created automatically
          4. Packages will be published to npm
        base: master
        delete-branch: true
