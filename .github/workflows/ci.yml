name: CI

on:
  push:
    branches: [main, master]

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'pnpm'
        registry-url: 'https://registry.npmjs.org'
    
    - name: Install dependencies
      run: pnpm install --shamefully-hoist
    
    - name: Build packages
      run: |
        # Build in dependency order
        pnpm --filter @agent-sync/core build
        pnpm --filter @agent-sync/schemas build
        pnpm --filter @agent-sync/cli build
    
    - name: Publish to npm
      run: |
        # Publish in dependency order
        cd packages/core && npm publish --access public || echo "Already published"
        cd ../schemas && npm publish --access public || echo "Already published"
        cd ../cli && npm publish --access public || echo "Already published"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
