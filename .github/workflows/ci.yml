name: Publish to NPM

on:
  push:
    branches: [main, master]

jobs:
  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'pnpm'
        registry-url: 'https://registry.npmjs.org'
    
    - name: Install dependencies
      run: pnpm install --shamefully-hoist
    
    - name: Build
      run: pnpm -r build
    
    - name: Publish @agent-sync/core
      run: |
        cd packages/core
        npm publish --access public || echo "Package already published or no version change"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      continue-on-error: true
    
    - name: Publish @agent-sync/schemas
      run: |
        cd packages/schemas
        npm publish --access public || echo "Package already published or no version change"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      continue-on-error: true
    
    - name: Publish @agent-sync/cli
      run: |
        cd packages/cli
        npm publish --access public || echo "Package already published or no version change"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      continue-on-error: true
