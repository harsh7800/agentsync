name: Publish to NPM

on:
  push:
    branches: [main, master]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'pnpm'
    
    - name: Install dependencies
      run: pnpm install --shamefully-hoist
    
    - name: Build packages (in dependency order)
      run: |
        # Build core first (no dependencies)
        pnpm --filter @agent-sync/core build
        # Build schemas (no dependencies)
        pnpm --filter @agent-sync/schemas build
        # Build cli last (depends on core and schemas)
        pnpm --filter @agent-sync/cli build
    
    - name: Test
      run: pnpm test -- --run

  publish:
    name: Publish to NPM
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'pnpm'
        registry-url: 'https://registry.npmjs.org'
    
    - name: Install dependencies
      run: pnpm install --shamefully-hoist
    
    - name: Build packages
      run: |
        pnpm --filter @agent-sync/core build
        pnpm --filter @agent-sync/schemas build
        pnpm --filter @agent-sync/cli build
    
    - name: Publish packages
      run: |
        # Publish in dependency order
        cd packages/core && npm publish --access public || echo "Already published"
        cd ../schemas && npm publish --access public || echo "Already published"
        cd ../cli && npm publish --access public || echo "Already published"
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
